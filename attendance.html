    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #1a5276, #2e86c1);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    header h1 { font-size: 1.1rem; font-weight: bold; letter-spacing: 0.04em; }
    header .date-display { font-size: 0.82rem; opacity: 0.85; }

    /* タブ */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #d0dbe8;
      position: sticky;
      top: 51px;
      z-index: 49;
    }
    .tab-btn {
      flex: 1;
      padding: 11px 6px;
      text-align: center;
      font-size: 0.88rem;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab-btn.active {
      color: #1a5276;
      border-bottom-color: #2e86c1;
    }

    /* ページ切替 */
    .page { display: none; }
    .page.active { display: block; }

    /* ===== 出勤入力ページ ===== */
    .toolbar {
      background: #fff;
      padding: 9px 12px;
      display: flex;
      gap: 7px;
      align-items: center;
      border-bottom: 1px solid #d5dde5;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 7px 13px;
      border: 1px solid #aaa;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .toolbar button:hover { background: #e8f4fd; }
    .toolbar button.danger { border-color: #e74c3c; color: #e74c3c; }
    .toolbar button.danger:hover { background: #fdf2f2; }
    .toolbar .spacer { flex: 1; }
    .last-updated { font-size: 0.7rem; color: #999; white-space: nowrap; }

    .list-container {
      max-width: 600px;
      margin: 16px auto;
      padding: 0 12px 180px;
    }

    .table-header {
      display: grid;
      grid-template-columns: 1fr 96px;
      padding: 9px 14px;
      background: #1a5276;
      color: white;
      border-radius: 8px 8px 0 0;
      font-size: 0.85rem;
      font-weight: bold;
      text-align: center;
    }
    .table-header .col-name { text-align: left; }

    .person-row {
      display: grid;
      grid-template-columns: 1fr 96px;
      padding: 7px 14px;
      background: #fff;
      border-bottom: 1px solid #edf0f3;
      align-items: center;
      transition: background 0.1s;
    }
    .person-row:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
    .person-row:hover { background: #f7fbff; }
    .person-row.absent .pname-text { color: #bbb; }

    .person-name {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .prefix-badge {
      font-size: 0.65rem;
      background: #e8ecf0;
      color: #666;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .bento-badge {
      font-size: 0.65rem;
      background: #fef3e2;
      color: #c0782a;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      font-weight: bold;
    }

    .check-cell { display: flex; justify-content: center; }
    .check-btn {
      width: 76px;
      height: 34px;
      border: 2px solid #ccc;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
      color: #aaa;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .check-btn.active {
      background: #27ae60;
      border-color: #1e8449;
      color: white;
    }

    /* フッター集計＋記録ボタン */

      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #1a5276, #2e86c1);
      color: white;
      padding: 10px 12px;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.2);
      z-index: 100;
    }
    .summary-inner {
      max-width: 600px;
      margin: 0 auto;
    }
    .summary-counts {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 9px;
    }
    .summary-label {
      font-size: 0.78rem;
      opacity: 0.85;
      font-weight: bold;
      align-self: center;
      white-space: nowrap;
    }
    .summary-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.15);
      border-radius: 7px;
      padding: 5px 10px;
      flex: 1;
    }
    .summary-card .s-label {
      font-size: 0.65rem;
      opacity: 0.85;
      white-space: nowrap;
    }
    .summary-card .s-count {
      font-size: 1.35rem;
      font-weight: bold;
      line-height: 1.1;
    }
    .summary-card .s-unit { font-size: 0.65rem; opacity: 0.8; }
    .summary-card.highlight { background: rgba(255,255,255,0.25); }
    .summary-divider {
      width: 1px;
      background: rgba(255,255,255,0.25);
      align-self: stretch;
    }

    .record-btn {
      width: 100%;
      padding: 10px;
      background: #f39c12;
      border: none;
      border-radius: 7px;
      color: white;
      font-size: 0.92rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .record-btn:hover { background: #d68910; }

    /* ===== 記録一覧ページ ===== */
    .history-container {
      max-width: 600px;
      margin: 16px auto;
      padding: 0 12px 40px;
    }
    .history-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .history-toolbar h2 {
      font-size: 1rem;
      color: #1a5276;
      flex: 1;
    }
    .history-toolbar button {
      padding: 7px 14px;
      border-radius: 5px;
      border: 1px solid #aaa;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .history-toolbar button:hover { background: #e8f4fd; }
    .history-toolbar button.danger { border-color: #e74c3c; color: #e74c3c; }

    .history-empty {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 0.9rem;
    }

    /* 記録テーブル */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.82rem;
    }
    .history-table thead tr {
      background: #1a5276;
      color: white;
    }
    .history-table th {
      padding: 9px 8px;
      text-align: center;
      font-weight: bold;
      white-space: nowrap;
    }
    .history-table th:first-child { text-align: left; padding-left: 12px; }
    .history-table tbody tr {
      border-bottom: 1px solid #edf0f3;
      transition: background 0.1s;
    }
    .history-table tbody tr:last-child { border-bottom: none; }
    .history-table tbody tr:hover { background: #f7fbff; }
    .history-table td {
      padding: 9px 8px;
      text-align: center;
      white-space: nowrap;
    }
    .history-table td:first-child { text-align: left; padding-left: 12px; color: #555; }
    .history-table td.num { font-weight: bold; color: #1a5276; }
    .history-table td.total { font-weight: bold; color: #e67e22; }
    .del-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      color: #bbb;
      font-size: 0.75rem;
      padding: 3px 8px;
      cursor: pointer;
    }
    .del-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fdf2f2; }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: white;
      border-radius: 10px;
      padding: 24px 26px;
      max-width: 300px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-box h3 { margin-bottom: 10px; color: #333; font-size: 1rem; }
    .modal-box p  { font-size: 0.85rem; color: #666; margin-bottom: 18px; line-height: 1.6; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .modal-buttons button {
      padding: 9px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: bold;
    }
    .btn-confirm { background: #e74c3c; color: white; }
    .btn-confirm-orange { background: #f39c12; color: white; }
    .btn-cancel  { background: #eee; color: #555; }

    /* 記録完了トースト */
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #27ae60;
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: bold;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

</div>

    <button onclick="checkAll()">✅ 全員出勤</button>

    <button class="danger" onclick="showModal('resetModal')">🔄 リセット</button>

    <span class="last-updated" id="lastUpdated"></span>
  </div>

  <div class="list-container">
    <div class="table-header">

    </div>
    <div id="personList"></div>
  </div>

  <!-- フッター集計 -->
  <div class="summary-footer" id="summaryFooter">
    <div class="summary-inner">
      <div class="summary-counts">
        <span class="summary-label">集計</span>
        <div class="summary-card">
          <span class="s-label">出勤人数</span>
          <span class="s-count" id="totalAttend">0</span>
          <span class="s-unit">名 / <span id="totalAll">0</span>名</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-card">
          <span class="s-label">三和 弁当</span>
          <span class="s-count" id="totalSanwa">0</span>
          <span class="s-unit">個</span>
        </div>
        <div class="summary-card">
          <span class="s-label">クレバー 弁当</span>
          <span class="s-count" id="totalClever">0</span>
          <span class="s-unit">個</span>
        </div>
        <div class="summary-card highlight">
          <span class="s-label">弁当 合計</span>
          <span class="s-count" id="totalBento">0</span>
          <span class="s-unit">個</span>
        </div>
      </div>
      <button class="record-btn" onclick="showModal('recordModal')">📝 本日の集計を記録する</button>
    </div>
  </div>
</div>

<!-- ===== 記録一覧ページ ===== -->
<div class="page" id="page-history">
  <div class="history-container">
    <div class="history-toolbar">
      <h2>📅 記録一覧</h2>
      <button onclick="exportCSV()">⬇ CSV出力</button>
      <button class="danger" onclick="showModal('clearHistoryModal')">🗑 全削除</button>
    </div>
    <div id="historyContent"></div>
  </div>
</div>

<!-- ===== モーダル群 ===== -->

<!-- リセット確認 -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <h3>確認</h3>
    <p>全員の出勤チェックをリセットします。<br>記録データは消えません。</p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideModal('resetModal')">キャンセル</button>
      <button class="btn-confirm" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<!-- 記録確認 -->
<div class="modal-overlay" id="recordModal">
  <div class="modal-box">
    <h3>本日の集計を記録</h3>
    <p id="recordPreview"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideModal('recordModal')">キャンセル</button>
      <button class="btn-confirm-orange" onclick="saveRecord()">記録する</button>
    </div>
  </div>
</div>

<!-- 行削除確認 -->
<div class="modal-overlay" id="delRowModal">
  <div class="modal-box">
    <h3>記録を削除</h3>
    <p id="delRowPreview"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideModal('delRowModal')">キャンセル</button>
      <button class="btn-confirm" onclick="deleteRecord()">削除する</button>
    </div>
  </div>
</div>

<!-- 全削除確認 -->
<div class="modal-overlay" id="clearHistoryModal">
  <div class="modal-box">
    <h3>全記録を削除</h3>
    <p>すべての記録を削除します。<br>この操作は元に戻せません。</p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="hideModal('clearHistoryModal')">キャンセル</button>
      <button class="btn-confirm" onclick="clearAllHistory()">全削除</button>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

  { name: "西尾 学",    prefix: "ク", bentoGroup: "clever" },
  { name: "広末望海",   prefix: "日", bentoGroup: "sanwa"  },
  { name: "森 卓也",    prefix: "和", bentoGroup: null     },
  { name: "中谷雅輝",   prefix: "日", bentoGroup: "sanwa"  },
  { name: "中谷陽生",   prefix: "日", bentoGroup: "sanwa"  },
  { name: "中谷夢愛",   prefix: "日", bentoGroup: "sanwa"  },
  { name: "竹内俊博",   prefix: "",   bentoGroup: null     },
  { name: "作 英樹",    prefix: "",   bentoGroup: "sanwa"  },
  { name: "殖田 学",    prefix: "",   bentoGroup: "sanwa"  },
  { name: "小倉伸司",   prefix: "",   bentoGroup: "sanwa"  }
];

// ====================================================
//  ストレージキー
// ====================================================
const KEY_STATE   = 'attendance_v2';
const KEY_HISTORY = 'attendance_history_v1';

// ====================================================
//  状態
// ====================================================
let state   = loadState();
let history = loadHistory();
let pendingDelIdx = null;

function loadState() {
  try { const s = localStorage.getItem(KEY_STATE); if (s) return JSON.parse(s); } catch(e) {}
  return { attend: {} };
}
function saveState() {
  try {
    localStorage.setItem(KEY_STATE, JSON.stringify(state));
    document.getElementById('lastUpdated').textContent =
      '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
  } catch(e) {}
}
function loadHistory() {
  try { const s = localStorage.getItem(KEY_HISTORY); if (s) return JSON.parse(s); } catch(e) {}
  return [];
}
function saveHistory() {
  try { localStorage.setItem(KEY_HISTORY, JSON.stringify(history)); } catch(e) {}
}

// ====================================================
//  タブ切替
// ====================================================
function switchTab(name) {
  ['input','history'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
  document.getElementById('summaryFooter').style.display = name === 'input' ? '' : 'none';
  if (name === 'history') renderHistory();
}

// ====================================================
//  名簿リスト描画
// ====================================================
function buildList() {
  const container = document.getElementById('personList');
  container.innerHTML = '';
  MEMBERS.forEach((m, idx) => {
    const attend = !!state.attend[idx];
    const row = document.createElement('div');
    row.className = 'person-row' + (attend ? '' : ' absent');
    row.id = 'row-' + idx;

    const nameDiv = document.createElement('div');
    nameDiv.className = 'person-name';
    let inner = '';
    if (m.prefix) inner += `<span class="prefix-badge">${m.prefix}</span>`;
    inner += `<span class="pname-text">${m.name}</span>`;
    if (m.bentoGroup) inner += `<span class="bento-badge">（弁）</span>`;
    nameDiv.innerHTML = inner;

    const cell = document.createElement('div');
    cell.className = 'check-cell';
    const btn = document.createElement('div');
    btn.className = 'check-btn' + (attend ? ' active' : '');
    btn.textContent = attend ? '✓ 出勤' : '　出勤';
    btn.onclick = () => toggleAttend(idx);
    cell.appendChild(btn);

    row.appendChild(nameDiv);
    row.appendChild(cell);
    container.appendChild(row);
  });
  updateSummary();
}

// ====================================================
//  出勤トグル
// ====================================================
function toggleAttend(idx) {
  state.attend[idx] = !state.attend[idx];
  saveState();
  const attend = state.attend[idx];
  const row = document.getElementById('row-' + idx);
  row.className = 'person-row' + (attend ? '' : ' absent');
  const btn = row.querySelector('.check-btn');
  btn.className = 'check-btn' + (attend ? ' active' : '');
  btn.textContent = attend ? '✓ 出勤' : '　出勤';
  updateSummary();
}

// ====================================================
//  集計計算
// ====================================================
function calcTotals() {
  let attend = 0, sanwa = 0, clever = 0;
  MEMBERS.forEach((m, i) => {
    if (state.attend[i]) {
      attend++;
      if (m.bentoGroup === 'sanwa')  sanwa++;
      if (m.bentoGroup === 'clever') clever++;
    }
  });
  return { attend, sanwa, clever, bento: sanwa + clever };
}

function updateSummary() {
  const t = calcTotals();
  document.getElementById('totalAll').textContent    = MEMBERS.length;
  document.getElementById('totalAttend').textContent = t.attend;
  document.getElementById('totalSanwa').textContent  = t.sanwa;
  document.getElementById('totalClever').textContent = t.clever;
  document.getElementById('totalBento').textContent  = t.bento;
}

// ====================================================
//  一括操作
// ====================================================
function checkAll()   { MEMBERS.forEach((_,i) => { state.attend[i] = true;  }); saveState(); buildList(); }
function uncheckAll() { MEMBERS.forEach((_,i) => { state.attend[i] = false; }); saveState(); buildList(); }
function resetAll()   { state = { attend: {} }; saveState(); hideModal('resetModal'); buildList(); }

// ====================================================
//  記録する
// ====================================================
function showModal(id) {
  if (id === 'recordModal') {
    const t = calcTotals();
    const dateStr = todayStr();
    // 同日記録の有無チェック
    const dup = history.find(r => r.date === dateStr);
    const dupNote = dup ? '<br><small style="color:#e74c3c;">※本日の記録がすでにあります（上書きされます）</small>' : '';
    document.getElementById('recordPreview').innerHTML =
      `<strong>${dateStr}</strong><br>出勤 ${t.attend}名　三和弁当 ${t.sanwa}個　クレバー弁当 ${t.clever}個　合計弁当 ${t.bento}個${dupNote}`;
  }
  if (id === 'delRowModal' && pendingDelIdx === null) return;
  document.getElementById(id).classList.add('show');
}
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

function saveRecord() {
  const t = calcTotals();
  const dateStr = todayStr();
  // 同日データがあれば上書き
  const dupIdx = history.findIndex(r => r.date === dateStr);
  const record = { date: dateStr, attend: t.attend, sanwa: t.sanwa, clever: t.clever, bento: t.bento };
  if (dupIdx >= 0) history[dupIdx] = record;
  else history.unshift(record); // 新しいものを先頭に
  saveHistory();
  hideModal('recordModal');
  showToast('✅ 記録しました！');
}

function todayStr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const days = ['日','月','火','水','木','金','土'];
  return `${y}/${m}/${d}（${days[now.getDay()]}）`;
}

// ====================================================
//  記録一覧描画
// ====================================================
function renderHistory() {
  const el = document.getElementById('historyContent');
  if (history.length === 0) {
    el.innerHTML = '<div class="history-empty">まだ記録がありません。<br>出勤入力後、「本日の集計を記録する」ボタンで保存できます。</div>';
    return;
  }
  let rows = '';
  history.forEach((r, i) => {
    rows += `<tr>
      <td>${r.date}</td>
      <td class="num">${r.attend}</td>
      <td class="num">${r.sanwa}</td>
      <td class="num">${r.clever}</td>
      <td class="total">${r.bento}</td>
      <td><button class="del-btn" onclick="confirmDelete(${i})">削除</button></td>
    </tr>`;
  });
  el.innerHTML = `
    <table class="history-table">
      <thead>
        <tr>
          <th>日付</th>
          <th>出勤</th>
          <th>三和弁当</th>
          <th>クレバー弁当</th>
          <th>弁当合計</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ====================================================
//  記録削除
// ====================================================
function confirmDelete(idx) {
  pendingDelIdx = idx;
  const r = history[idx];
  document.getElementById('delRowPreview').textContent =
    `${r.date} の記録を削除します。`;
  showModal('delRowModal');
}
function deleteRecord() {
  if (pendingDelIdx === null) return;
  history.splice(pendingDelIdx, 1);
  saveHistory();
  pendingDelIdx = null;
  hideModal('delRowModal');
  renderHistory();
  showToast('削除しました');
}
function clearAllHistory() {
  history = [];
  saveHistory();
  hideModal('clearHistoryModal');
  renderHistory();
  showToast('全記録を削除しました');
}

// ====================================================
//  CSV出力
// ====================================================
function exportCSV() {
  if (history.length === 0) { showToast('記録がありません', true); return; }
  const bom = '\uFEFF';
  const header = '日付,出勤人数,三和弁当,クレバー弁当,弁当合計\n';
  const rows = history.map(r =>
    `${r.date},${r.attend},${r.sanwa},${r.clever},${r.bento}`
  ).join('\n');
  const blob = new Blob([bom + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '出勤弁当記録_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ====================================================
//  トースト通知
// ====================================================
function showToast(msg, warn) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = warn ? '#e74c3c' : '#27ae60';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ====================================================
//  ヘッダー日付
// ====================================================
function setHeaderDate() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
}

// ====================================================
//  起動
// ====================================================
setHeaderDate();
buildList();
try {
  if (localStorage.getItem(KEY_STATE))
    document.getElementById('lastUpdated').textContent = '（前回のデータを読込済）';
} catch(e) {}
</script>
</body>
</html>
